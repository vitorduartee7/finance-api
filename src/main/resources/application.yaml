server:
  port: 8080

spring:
  application:
    name: finance-api
  datasource:
    url: jdbc:postgresql://localhost:5432/finance_api
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  expiration: ${JWT_EXPIRATION:900000}
  key: ${JWT_KEY}